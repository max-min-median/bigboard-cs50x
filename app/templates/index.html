{% extends "layout.html" %}

{% block extra_head %}

    <link rel="stylesheet" href="{{ url_for('static', filename='submit_page.css') }}">

{% endblock %}

{% block main %}

    <div id="submit-page-container">
        <div id="use-dist-container">
            <label id="use-dist-label">
                <input type="checkbox" id="use-dist-checkbox" autocomplete="off" checked>
                Use distribution <code>dictionary.h</code>
            </label>
        </div>

        <form id="submit-form">
            <div id="textareas-container">
                <div class="textarea-group">
                    <div class="textarea-label-row">
                        <label for="code-input">Paste your <code>dictionary.c</code> below or</label>
                        <button type="button" class="upload-btn" onclick="document.getElementById('code-file-input').click()">Upload</button>
                        <input type="file" id="code-file-input" accept=".c,.h,.txt" hidden>
                    </div>
                    <textarea id="code-input" name="code" placeholder="// your dictionary.c here..."
                        spellcheck="false"></textarea>
                </div>
                <div id="textarea-divider" hidden></div>
                <div class="textarea-group" id="header-group" hidden>
                    <div class="textarea-label-row">
                        <label for="header-input">Paste your <code>dictionary.h</code> below or</label>
                        <button type="button" class="upload-btn" onclick="document.getElementById('header-file-input').click()">Upload</button>
                        <input type="file" id="header-file-input" accept=".c,.h,.txt" hidden>
                    </div>
                    <textarea id="header-input" name="header" placeholder="// your dictionary.h here..."
                        spellcheck="false"></textarea>
                </div>
            </div>
            <div id="submit-container">
                <button type="submit"
                        class="submit-code-button"
                        id="submit-btn"
                        disabled
                        data-logged-in="{{ 'true' if current_user.is_authenticated else 'false' }}">
                    Submit
                </button>
            </div>
        </form>

        <div id="output-area">
            <pre id="output">{% if not current_user.is_authenticated %}Please log in to benchmark your speller code.{% endif %}</pre>
        </div>
    </div>

    <script src="{{ url_for('static', filename='submit_page.js') }}"></script>

{% endblock %}
