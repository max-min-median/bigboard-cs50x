{% extends "layout.html" %}

{% block main %}

    <div class="container py-5 text-center" id="registration-form">
        <form action="/register" method="post">

            <!-- Username field -->
            <div class="mb-3">
                <input class="form-control mx-auto w-auto" id="username" autocomplete="off" autofocus name="username" placeholder="Username" type="text" required>
                <div id="username-whitespace-warning" class="text-danger small mt-1" style="display: none;">
                    ⚠️ Note: Extra spaces at the beginning or end in the username will be removed.
                </div>
            </div>

            <!-- Password field -->
            <div class="mb-3">
                <input class="form-control mx-auto w-auto" id="password" autocomplete="off" name="password" placeholder="Password" type="password" required>
                <div id="password-whitespace-warning" class="text-danger small mt-1" style="display: none;">
                    ⚠️ Password starts or ends with one or more spaces. Is this intentional?
                </div>
            </div>

            <!-- Password confirmation field -->
            <div class="mb-3">
                <input class="form-control mx-auto w-auto" id="confirmation" autocomplete="off" name="confirmation" placeholder="Password Again" type="password" required>
                <div id="password-match-warning" class="text-danger small mt-1" style="display: none;">
                    ❌ Password and confirmation must match, please try again!
                </div>
            </div>

            <!-- Submit button -->
            <button type="submit">Register</button>

        </form>
    </div>

{% endblock %}
