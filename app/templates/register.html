{% extends "layout.html" %}

{% block main %}

    <div class="container py-5 text-center" id="registration-form">
        <form action="{{ url_for('main.register') }}" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- Username field -->
            <div class="mb-3">
                <input class="form-control mx-auto w-auto" id="username" autocomplete="off" autofocus name="username" placeholder="Username" type="text" value="{{ username or '' }}" required>
                <div id="username-whitespace-warning" class="text-danger small mt-1" style="display: none;">
                    ⚠️ Extra spaces at the beginning or end in the username will be removed.
                </div>
            </div>

            <!-- Password field -->
            <div class="mb-3">
                <input class="form-control mx-auto w-auto" id="password" autocomplete="off" name="password" placeholder="Password" type="password" required>
                <div id="password-whitespace-warning" class="text-danger small mt-1" style="display: none;">
                    ⚠️ Password starts or ends with one or more spaces.
                </div>
            </div>

            <!-- Password confirmation field -->
            <div class="mb-3">
                <input class="form-control mx-auto w-auto" id="confirmation" autocomplete="off" name="confirmation" placeholder="Password Again" type="password" required>
                <div id="password-match-warning" class="text-danger small mt-1" style="display: none;">
                    Password and confirmation must match
                </div>
            </div>

            <!-- Submit button -->
            <button type="submit">Register</button>

            {% if error %}
            <div id="registration-error" class="text-danger small mt-3">{{ error }}</div>
            {% endif %}

        </form>
    </div>

{% endblock %}
