<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Bigboard50x Speller Benchmark</title>
        <meta name="csrf-token" content="{{ csrf_token() }}">
        <meta name="script-name" content="{{ request.script_root }}">
        <link rel="icon" href="{{ url_for('static', filename='cs50.ico') }}" type="image/x-icon">

        <!-- Get Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script>
        // Test whether Bootstrap CSS loaded from CDN by checking if d-none class applies display: none
        // We use CDN to reduce requests to our server for assets, but serve our own copy if needed
            (function() {
                var test = document.createElement('div');
                test.className = 'd-none';
                document.head.appendChild(test);
                if (getComputedStyle(test).display !== 'none') {
                    var link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = "{{ url_for('static', filename='libs/bootstrap.min.css') }}";
                    document.head.appendChild(link);
                    console.warn('Bootstrap CDN failed, loading local fallback');
                }
                document.head.removeChild(test);
            })();
        </script>

        {% assets "css_bundled" %}
            <link rel="stylesheet" href="{{ ASSET_URL }}">
        {% endassets %}
        {% assets "js_bundled" %}
            <script src="{{ ASSET_URL }}" defer></script>
        {% endassets %}
    </head>

    <body>
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container-fluid">
                <a class="nav-title" href="{{ url_for('main.index') }}">Bigboard50x Speller Benchmark</a>

                <div class="navbar-nav me-auto">
                    <a class="nav-link-custom" href="{{ url_for('main.index') }}">Submit Code</a>
                    <a class="nav-link-custom" href="{{ url_for('main.leaderboard') }}">Leaderboard</a>
                </div>

                <div class="navbar-nav">
                    {% if current_user.is_authenticated %}
                        <a class="nav-link-custom" href="{{ url_for('main.profile') }}">Profile</a>
                        <a class="nav-link-custom" href="{{ url_for('main.logout') }}">Log Out</a>
                    {% else %}
                        <a class="nav-link-custom" href="{{ url_for('main.register') }}">Register</a>
                        <a class="nav-link-custom" href="{{ url_for('main.login') }}">Login</a>
                    {% endif %}
                </div>
            </div>
        </nav>

        <main>
            {% block main %}{% endblock %}
        </main>
    </body>
    
</html>
